<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Down Memory Lane</title>
    <script>
      // GitHub Pages has no server-side routing, so a deep link like
      // /Down-Memory-Lane/item/foo 404s. This page (served for any 404)
      // rewrites the URL to /Down-Memory-Lane/?/item/foo and reloads index.html,
      // where a small script in index.html restores the real path for the router.
      // pathSegmentsToKeep = 1 keeps the "/Down-Memory-Lane" project segment.
      (function () {
        var pathSegmentsToKeep = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
